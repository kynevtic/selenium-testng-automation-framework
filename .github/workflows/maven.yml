name: Selenium Test Automation Workflow

on:
  schedule:
  - cron: 0 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Running Test Automation Framework using Maven
      run: mvn test -X -Dbrowser=chrome -DisLambdaTest=false -DisHeadless=false

    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v3.2.2
      with:
        name: Test Logs
        path: logs/

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v3.2.2
      with:
        name: Test Reports
        path: reports/report.html

    - name: Test Execution Status
      run: echo "Test Execution Completed...!!!"
    
          

      
